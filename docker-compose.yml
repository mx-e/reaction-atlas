# Local development database for reaction-atlas.
#
# This repository ships the scientific code, not the cloud orchestration or the
# (separately hosted) API/frontend. The only service needed to exercise the
# pipeline locally is PostgreSQL:
#
#   docker compose up -d db     # start PostgreSQL on localhost:5432
#   docker compose down -v      # stop and wipe the data volume
#
# The GPU/CPU exploration workers and the kinetics CLI are run directly with
# `uv` (see docs/reproducing.md), pointing at the DATABASE_URL below:
#
#   export DATABASE_URL=postgresql://crn:crn@localhost:5432/crn_cloud
#
# The self-contained kinetics demo (demo/kinetics/) needs no database at all.

services:
  db:
    image: postgres:15
    environment:
      POSTGRES_USER: crn
      POSTGRES_PASSWORD: crn
      POSTGRES_DB: crn_cloud
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U crn"]
      interval: 2s
      timeout: 5s
      retries: 10

volumes:
  pgdata:
